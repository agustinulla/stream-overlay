<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Hora y Clima Stream - Egatorei</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;              /* negro oscuro para buen contraste en amarillo */
      height: 100vh;
    }
    .container {
      width: 538px;
      height: 200px;
      margin: 0 auto;
      position: relative;
    }
    .fondo {
      position: absolute;
      inset: 0;
      background: url("file:///C:/Users/USUARIO/Desktop/E'Gatorei/Scripts Propios/recuadro1.png") center / 100% 100% no-repeat;
      pointer-events: none;
      z-index: 1;
    }
    .contenido {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;              /* ← ajusta este valor: 40–80px según cómo se vea */
      height: 100%;
    }
    .hora {
      font-size: 68px;              /* más grande para aprovechar el ancho */
      font-weight: bold;
      text-shadow: 3px 3px 8px rgba(0,0,0,0.5);
      min-width: 180px;
      text-align: center;
      letter-spacing: 3px;
    }
    .clima {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .icono {
      width: 90px;
      height: 90px;
    }
    .info-clima {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    .temp {
      font-size: 62px;
      font-weight: bold;
      line-height: 1;
      text-shadow: 3px 3px 8px rgba(0,0,0,0.5);
    }
    .temp sup {
      font-size: 0.55em;
      vertical-align: super;
    }
    .desc {
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
      text-transform: capitalize;
      margin-top: -6px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="fondo"></div>
  
  <div class="contenido">
    <div class="hora" id="hora">--:--</div>
    
    <div class="clima">
      <img id="icono" class="icono" src="" alt="clima">
      <div class="info-clima">
        <div class="temp" id="temp">--<sup>°C</sup></div>
        <div class="desc" id="desc">--</div>
      </div>
    </div>
  </div>
</div>

<script>
// HORA ────────────────────────────────────────────────
function actualizarHora() {
  const ahora = new Date();
  const h = ahora.getHours().toString().padStart(2, '0');
  const m = ahora.getMinutes().toString().padStart(2, '0');
  document.getElementById('hora').textContent = `${h}:${m}`;
}
setInterval(actualizarHora, 1000);
actualizarHora();

// CLIMA ────────────────────────────────────────────────
const API_KEY = '812f4eba5a03c5639915d1955c6cefc9';
const LAT = -31.776;
const LON = -63.801;
const url = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&appid=${API_KEY}&units=metric&lang=es`;

async function cargarClima() {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.cod !== 200) throw new Error(data.message || 'Error API');
    
    const temp = Math.round(data.main.temp);
    const iconCode = data.weather[0].icon;
    let desc = data.weather[0].description;
    desc = desc.charAt(0).toUpperCase() + desc.slice(1);
    
    document.getElementById('temp').innerHTML = `${temp}<sup>°C</sup>`;
    document.getElementById('desc').textContent = desc;
    document.getElementById('icono').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
    
  } catch (err) {
    console.error('Error clima:', err);
    document.getElementById('temp').textContent = 'Error';
    document.getElementById('desc').textContent = 'No disponible';
    document.getElementById('icono').src = 'https://openweathermap.org/img/wn/03d@2x.png';
  }
}

cargarClima();
setInterval(cargarClima, 900000); // 15 minutos
</script>

</body>
</html>
