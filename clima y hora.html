<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Hora y Clima Stream - Egatorei</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;          /* Blanco para contraste en fondos oscuros; cambialo a #000 si tu fondo es claro */
      height: 100vh;
    }
    .container {
      width: 400px;             /* Ancho más chico sin recuadro, ajustalo a gusto */
      height: auto;             /* Altura automática, se adapta al contenido */
      margin: 0 auto;
      padding: 15px 25px;       /* Espacio interno para que no pegue al borde */
      background: rgba(0, 0, 0, 0.4); /* Fondo semi-transparente negro opcional; quitá esta línea si querés 100% transparente */
      border-radius: 12px;      /* Bordes redondeados suaves; quitá si no querés */
      backdrop-filter: blur(4px); /* Efecto vidrio esmerilado (funciona en la mayoría de navegadores modernos) */
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* Sombra sutil para que destaque */
    }
    .hora {
      font-size: 58px;
      font-weight: bold;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
      min-width: 160px;
      text-align: center;
      letter-spacing: 2px;
    }
    .clima {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .icono {
      width: 70px;
      height: 70px;
    }
    .info-clima {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .temp {
      font-size: 52px;
      font-weight: bold;
      line-height: 1;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }
    .temp sup {
      font-size: 0.55em;
      vertical-align: super;
    }
    .desc {
      font-size: 20px;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
      text-transform: capitalize;
      margin-top: -4px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="hora" id="hora">--:--</div>
  
  <div class="clima">
    <img id="icono" class="icono" src="" alt="clima">
    <div class="info-clima">
      <div class="temp" id="temp">--<sup>°C</sup></div>
      <div class="desc" id="desc">--</div>
    </div>
  </div>
</div>

<script>
// HORA
function actualizarHora() {
  const ahora = new Date();
  const h = ahora.getHours().toString().padStart(2, '0');
  const m = ahora.getMinutes().toString().padStart(2, '0');
  document.getElementById('hora').textContent = `${h}:${m}`;
}
setInterval(actualizarHora, 1000);
actualizarHora();

// CLIMA
const API_KEY = '812f4eba5a03c5639915d1955c6cefc9';
const LAT = -31.776;
const LON = -63.801;
const url = `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&appid=${API_KEY}&units=metric&lang=es`;

async function cargarClima() {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.cod !== 200) throw new Error(data.message || 'Error API');
    
    const temp = Math.round(data.main.temp);
    const iconCode = data.weather[0].icon;
    let desc = data.weather[0].description;
    desc = desc.charAt(0).toUpperCase() + desc.slice(1);
    
    document.getElementById('temp').innerHTML = `${temp}<sup>°C</sup>`;
    document.getElementById('desc').textContent = desc;
    document.getElementById('icono').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
    
  } catch (err) {
    console.error('Error clima:', err);
    document.getElementById('temp').textContent = 'Error';
    document.getElementById('desc').textContent = 'No disponible';
    document.getElementById('icono').src = 'https://openweathermap.org/img/wn/03d@2x.png';
  }
}

cargarClima();
setInterval(cargarClima, 900000);
</script>

</body>
</html>
